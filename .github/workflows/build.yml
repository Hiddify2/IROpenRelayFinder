name: Build & Release (Nuitka)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build Linux on an older runner so the binary targets an older glibc.
          - os: ubuntu-22.04
            artifact: Linux
          - os: windows-latest
            artifact: Windows
          - os: macos-latest
            artifact: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Cache pip downloads between builds.
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "nuitka[onefile]"

          # Optional, if the project adds dependencies later:
          # python -m pip install -r requirements.txt

      - name: Install Windows curses
        if: runner.os == 'Windows'
        run: python -m pip install windows-curses

      - name: Validate Python sources
        run: python -m compileall -q main.py cores utils scripts

      # Inject runtime path fix. Use Python here so the step is shell-agnostic.
      - name: Create sitecustomize.py
        shell: python
        run: |
          from pathlib import Path
          from textwrap import dedent

          Path("sitecustomize.py").write_text(
              dedent(
                  """\
                  import os, sys, builtins

                  base = getattr(sys, "_MEIPASS", None)
                  if base:
                      _open = builtins.open

                      def fixed_open(path, *args, **kwargs):
                          if isinstance(path, str) and not os.path.isabs(path):
                              new_path = os.path.join(base, path)
                              if os.path.exists(new_path):
                                  path = new_path
                          return _open(path, *args, **kwargs)

                      builtins.open = fixed_open
                  """
              ),
              encoding="utf-8",
          )

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang patchelf gcc g++

      - name: Check macOS compiler
        if: runner.os == 'macOS'
        run: |
          clang --version

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          export CC=clang
          export CXX=clang++
          # Pin the macOS deployment target so the binary runs on Big Sur+
          # (arm64's earliest supported release). Ignored on Linux.
          export MACOSX_DEPLOYMENT_TARGET=11.0

          python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --clang \
            --lto=yes \
            --output-filename=app \
            --output-dir=build \
            --include-module=sitecustomize \
            --include-package=cores \
            --include-package=utils \
            --include-data-dir=assets=assets \
            --include-data-dir=IranASNs=IranASNs \
            main.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --lto=yes \
            --output-filename=app \
            --output-dir=build \
            --include-module=sitecustomize \
            --include-package=cores \
            --include-package=utils \
            --include-data-dir=assets=assets \
            --include-data-dir=IranASNs=IranASNs \
            main.py

      - name: Rename (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mv build/app build/app-${{ matrix.artifact }}
          chmod +x build/app-${{ matrix.artifact }}

      - name: Rename (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv build/app.exe build/app-windows.exe

      - name: Verify packaged executable
        shell: python
        run: |
          import subprocess
          import sys
          from pathlib import Path

          exe = Path("build") / ("app-windows.exe" if sys.platform == "win32" else "app-${{ matrix.artifact }}")
          if not exe.exists():
              raise SystemExit(f"Built executable not found: {exe}")

          result = subprocess.run(
              [str(exe), "--core", "package_check"],
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
              timeout=120,
          )
          print(result.stdout)
          raise SystemExit(result.returncode)

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf dist/app-${{ matrix.artifact }}.tar.gz -C build app-${{ matrix.artifact }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          # ditto preserves the ad-hoc code signature and extended attributes
          # that tar/zip would otherwise strip, so Gatekeeper still recognises
          # the signature after the user unzips the download.
          (cd build && ditto -c -k app-macOS ../dist/app-macOS.zip)

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/app-windows.exe dist/app-windows.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: app-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
